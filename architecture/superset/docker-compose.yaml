services:
  superset-redis:
    image: redis:7
    container_name: superset-redis
    networks:
      - nginx_network

  superset:
    image: 10.20.50.25:8081/apache/superset:6.1.0-pgsql
    container_name: superset
    depends_on:
      - superset-redis
    environment:
      SUPERSET_SECRET_KEY: "PthWs8xVZ6BoucOP2BjxCObM/oTQkUUX7WQjcGYJ9gum4dRXfKZBnYl8"
      SQLALCHEMY_DATABASE_URI: "postgresql+psycopg2://superset:superset@10.20.15.45:5432/superset"
      REDIS_HOST: "superset-redis"
      REDIS_PORT: "6379"
    volumes:
      - superset_home:/app/superset_home
    command: >
      /bin/sh -c "
      superset db upgrade &&
      superset fab create-admin --username admin --firstname Superset --lastname Admin --email admin@admin.com --password admin || true &&
      superset init &&
      /usr/bin/run-server.sh
      "
    networks:
      - nginx_network

volumes:
  superset_home:

networks:
  nginx_network:
    external: true