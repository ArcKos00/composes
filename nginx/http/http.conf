server {
    listen 6666 http2;
    server_name otel-collector;

    location / {
        grpc_pass grpc://aspire-dashboard:18889;

        grpc_read_timeout 3600s;
        grpc_send_timeout 3600s;

        grpc_set_header Host $host;
    }
}

server {
    listen 8080;
    server_name main;

    client_max_body_size 0;

    location /kk-django/ {
        proxy_pass http://kk-django-web:8000/;
    }

    location /google-sync/ {
        proxy_pass http://google-sync:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass http://keycloak:8080/auth/;
    
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Forwarded-Host $host:$server_port;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        proxy_pass http://aspire-dashboard:18888/;
    }
}

server {
    listen 8081 ssl;
    server_name nexus.local;

    ssl_certificate /etc/nginx/certs/nexus.local.crt;
    ssl_certificate_key /etc/nginx/certs/nexus.local.key;

    client_max_body_size 0;

    location /v2/ {
        proxy_pass https://nexus:444;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 8081;
        proxy_set_header Docker-Distribution-Api-Version "registry/2.0";
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    location / {
        proxy_pass https://nexus:8443;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 8081;
    }

    location /repository/ {
        proxy_pass http://nexus:444/repository/;
    }
}

