
services:
  nginx:
    image: nginx:1.29.7
    container_name: nginx_proxy
    ports:
      - "5432:5432"
      - "8080:8080"
      - "8081:8081"
      - "8082:8082"
      - "6666:6666"
      - "8084:8084"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./stream:/etc/nginx/stream.conf.d:ro
      - ./http:/etc/nginx/conf.d:ro
      - ./certs:/etc/nginx/certs
    restart: unless-stopped
    networks:
      - nginx_network

networks:
  nginx_network:
    external: true