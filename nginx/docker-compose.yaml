
services:
  nginx:
    image: nginx:1.29.7
    container_name: nginx_proxy
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs
    restart: unless-stopped
    networks:
      - nginx_network

networks:
  nginx_network:
    external: true