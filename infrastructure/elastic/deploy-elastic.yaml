apiVersion: v1
kind: Namespace
metadata:
  name: infrastructure

---
# Elasticsearch Deployment, Service, Ingress
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: infrastructure
  labels:
    app: elasticsearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      volumes:
        - name: elasticsearch-data
          persistentVolumeClaim:
            claimName: elasticsearch-pvc
      containers:
        - name: elasticsearch
          image: 10.20.50.25:8081/elasticsearch/elasticsearch:8.13.0
          imagePullPolicy: Always
          volumeMounts:
            - name: elasticsearch-data
              mountPath: /usr/share/elasticsearch/data
          envFrom:
            - configMapRef:
                name: elasticsearch-config
            - secretRef:
                name: elastic-user-secret
            - secretRef:
                name: elasticsearch-user-secret
            - secretRef:
                name: kibana-system-credentials-secret
            - secretRef:
                name: reader-user-secret
          ports:
            - name: http
              containerPort: 9200
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: infrastructure
spec:
  type: ClusterIP
  selector:
    app: elasticsearch
  ports:
    - name: http
      protocol: TCP
      port: 9200
      targetPort: 9200
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: elasticsearch
  namespace: infrastructure
spec:
  ingressClassName: haproxy
  rules:
    - host: elasticsearch.infrastructure.kub.k2.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: elasticsearch
                port:
                  number: 9200

--- # Kibana Deployment, Service, Ingress
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: infrastructure
  labels:
    app: kibana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox
          command:
            [
              "sh",
              "-c",
              "until nslookup elasticsearch.infrastructure.svc.cluster.local; do echo waiting for elasticsearch; sleep 2; done;",
            ]
      volumes:
        - name: kibana-data
          persistentVolumeClaim:
            claimName: kibana-pvc
      containers:
        - name: kibana
          image: 10.20.50.25:8081/kibana/kibana:8.13.0
          imagePullPolicy: Always
          volumeMounts:
            - name: kibana-data
              mountPath: /usr/share/kibana/data
          envFrom:
            - configMapRef:
                name: elasticsearch-host-config
            - configMapRef:
                name: kibana-host-config
            - configMapRef:
                name: kibana-server-config
            - secretRef:
                name: elastic-user-secret
            - secretRef:
                name: kibana-system-user-secret
          ports:
            - name: http
              containerPort: 5601
---
apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: infrastructure
spec:
  type: ClusterIP
  selector:
    app: kibana
  ports:
    - name: http
      protocol: TCP
      port: 5601
      targetPort: 5601
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kibana
  namespace: infrastructure
spec:
  ingressClassName: haproxy
  rules:
    - host: kibana.infrastructure.kub.k2.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kibana
                port:
                  number: 5601

--- # ElasticApm Deployment, Service, Ingress
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apm-server
  namespace: infrastructure
  labels:
    app: apm-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apm-server
  template:
    metadata:
      labels:
        app: apm-server
    spec:
      initContainers:
        - name: wait-for-elasticsearch
          image: busybox
          command:
            [
              "sh",
              "-c",
              "until nslookup elasticsearch.infrastructure.svc.cluster.local; do echo waiting for elasticsearch; sleep 2; done;",
            ]
        - name: wait-for-kibana
          image: busybox
          command:
            [
              "sh",
              "-c",
              "until nslookup kibana.infrastructure.svc.cluster.local; do echo waiting for kibana; sleep 2; done;",
            ]
      volumes:
        - name: apm-server-data
          persistentVolumeClaim:
            claimName: elastic-apm-pvc
      containers:
        - name: apm-server
          image: 10.20.50.25:8081/apm/apm-server:8.13.0
          imagePullPolicy: Always
          volumeMounts:
            - name: apm-server-data
              mountPath: /usr/share/apm-server/data
          envFrom:
            - configMapRef:
                name: elasticsearch-host-config
            - configMapRef:
                name: kibana-host-config
            - configMapRef:
                name: kibana-server-config
            - secretRef:
                name: elasticsearch-user-secret
            - secretRef:
                name: elastic-user-secret
            - secretRef:
                name: reader-user-secret
          ports:
            - name: http
              containerPort: 8200
---
apiVersion: v1
kind: Service
metadata:
  name: apm-server
  namespace: infrastructure
spec:
  type: ClusterIP
  selector:
    app: apm-server
  ports:
    - name: http
      protocol: TCP
      port: 8200
      targetPort: 8200
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apm-server
  namespace: infrastructure
spec:
  ingressClassName: haproxy
  rules:
    - host: apm.infrastructure.kub.k2.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: apm-server
                port:
                  number: 8200

--- # Secrets
apiVersion: v1
kind: Secret
metadata:
  name: "elastic-user-secret"
  namespace: infrastructure
stringData:
  ELASTIC_USERNAME: elastic
  ELASTIC_PASSWORD: changeme

---
apiVersion: v1
kind: Secret
metadata:
  name: "elasticsearch-user-secret"
  namespace: infrastructure
stringData:
  ELASTICSEARCH_USERNAME: elastic
  ELASTICSEARCH_PASSWORD: changeme

---
apiVersion: v1
kind: Secret
metadata:
  name: "kibana-system-credentials-secret"
  namespace: infrastructure
stringData:
  KIBANA_SYSTEM_USERNAME: kibana-system
  KIBANA_SYSTEM_PASSWORD: changeme

---
apiVersion: v1
kind: Secret
metadata:
  name: "kibana-system-user-secret"
  namespace: infrastructure
stringData:
  ELASTICSEARCH_USERNAME: kibana-system
  ELASTICSEARCH_PASSWORD: changeme
  KIBANA_SYSTEM_USERNAME: kibana-system
  KIBANA_SYSTEM_PASSWORD: changeme

---
apiVersion: v1
kind: Secret
metadata:
  name: "reader-user-secret"
  namespace: infrastructure
stringData:
  READER_USERNAME: reader
  READER_PASSWORD: changeme

--- # Configs
apiVersion: v1
kind: ConfigMap
metadata:
  name: "elasticsearch-config"
  namespace: infrastructure
data:
  discovery.type: "single-node"
  xpack.security.enabled: "true"
  xpack.security.http.ssl.enabled: "false"
  ES_JAVA_OPTS: "-Xms1g -Xmx1g"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: "elasticsearch-host-config"
  namespace: infrastructure
data:
  ELASTICSEARCH_HOSTS: "http://elasticsearch.infrastructure.svc.cluster.local:9200"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: "kibana-host-config"
  namespace: infrastructure
data:
  KIBANA_HOST: "http://kibana.infrastructure.svc.cluster.local:5601"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: "kibana-server-config"
  namespace: infrastructure
data:
  #SERVER_BASEPATH: "/kibana"
  XPACK_SECURITY_ENABLED: "true"
  #SERVER_REWRITEBASEPATH: "true"

--- # Volumes
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: elasticsearch-pvc
  namespace: infrastructure
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kibana-pvc
  namespace: infrastructure
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: elastic-apm-pvc
  namespace: infrastructure
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
